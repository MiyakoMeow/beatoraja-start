name: Rust

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - 'build.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - 'rustfmt.toml'
      - 'clippy.toml'
      - '.github/workflows/rust.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - 'build.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - 'rustfmt.toml'
      - 'clippy.toml'
      - '.github/workflows/rust.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - run: cargo build --verbose --all-features

  clippy:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - run: cargo clippy --verbose --all-features -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - run: cargo fmt --check
